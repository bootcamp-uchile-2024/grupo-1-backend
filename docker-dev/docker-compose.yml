version: '3.8'

services:
  api:
    image: "node:${VERSION_NODE}"
    command: "npm run start:dev"
    user: node
    working_dir: /app
    environment:
      - PUERTO_NESTJS=${PUERTO}
    ports:
      - "3000:${PUERTO}"
    volumes:
      - .:/app
    depends_on:
      - mysql
    networks:
      - plantopiadev-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - '3307:${DB_PORT}' # 3307 es el puerto local, DB_PORT ES EL DEL CONTENEDOR
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS_ROOT}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plantopiadev-network

  flyway:
    image: flyway/flyway:10.20.1-alpine
    volumes:
      - ./scripts:/flyway/sql
    environment:
      HOST: ${DB_HOST}
      PORT: ${DB_PORT}
      DB_NAME: ${DB_DATABASE}
      DB_USER: ${DB_USERNAME}
      DB_PASS: ${DB_PASSWORD}
    command: -url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE} -user=${DB_USERNAME} -password=${DB_PASSWORD} -connectRetries=5 migrate
    depends_on:
      - mysql
    networks:
      - plantopiadev-network

networks:
  plantopiadev-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
